services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3080:80"
    networks:
      - tfmobility
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8090:8000"
    volumes:
      - db-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/tfmobility.db
    networks:
      - tfmobility
    restart: unless-stopped

  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    command: ["python", "main.py", "--scheduled"]
    volumes:
      - db-data:/app/data
      - etl-cache:/app/cache
    environment:
      - DATABASE_PATH=/app/data/tfmobility.db
      - ETL_CACHE_DIR=/app/cache
      - PLACSP_CACHE_DIR=/app/cache/placsp
    depends_on:
      backend:
        condition: service_started
    networks:
      - tfmobility
    restart: unless-stopped

volumes:
  db-data:
  etl-cache:

networks:
  tfmobility:
    driver: bridge
